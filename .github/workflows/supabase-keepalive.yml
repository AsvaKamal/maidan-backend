name: Supabase keep-alive

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install pg --no-save
      - run: node scripts/ping_supabase.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
